services:
  # ==================== 应用（可选 app profile） ====================
  migrate:
    profiles: ["app"]
    image: industry-research-assistant-backend:local
    command: ["python", "/app/app/scripts/run_migrations.py"]
    restart: "no"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: industry_assistant
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - industry_network

  backend:
    profiles: ["app"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: industry-research-assistant-backend:local
    container_name: industry_backend
    restart: unless-stopped
    environment: &app-environment
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: industry_assistant
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      # auto: cloud 配置完整时使用云端，否则回退本地；也可显式设为 local/cloud。
      MODEL_ROUTING_MODE: ${MODEL_ROUTING_MODE:-auto}
      LOCAL_LLM_PROVIDER: ${LOCAL_LLM_PROVIDER:-ollama}
      LOCAL_LLM_API_KEY: ${LOCAL_LLM_API_KEY:-ollama}
      # 容器内不能用宿主机的 127.0.0.1，通过独立 Docker 覆盖项访问 Ollama。
      LOCAL_LLM_BASE_URL: ${DOCKER_LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-industry-qwen3:4b}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      CLOUD_LLM_PROVIDER: ${CLOUD_LLM_PROVIDER:-bailian}
      CLOUD_LLM_API_KEY: ${CLOUD_LLM_API_KEY:-}
      CLOUD_LLM_BASE_URL: ${CLOUD_LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      CLOUD_LLM_MODEL: ${CLOUD_LLM_MODEL:-deepseek-v4-flash}
      CLOUD_LLM_MAX_OUTPUT_TOKENS: ${CLOUD_LLM_MAX_OUTPUT_TOKENS:-4096}
      CLOUD_LLM_TEMPERATURE: ${CLOUD_LLM_TEMPERATURE:-0.2}
      CLOUD_AGENT_ARCHITECT_MODEL: ${CLOUD_AGENT_ARCHITECT_MODEL:-deepseek-v4-pro}
      CLOUD_AGENT_SCOUT_MODEL: ${CLOUD_AGENT_SCOUT_MODEL:-deepseek-v4-flash}
      CLOUD_AGENT_DATA_ANALYST_MODEL: ${CLOUD_AGENT_DATA_ANALYST_MODEL:-deepseek-v4-pro}
      CLOUD_AGENT_WIZARD_MODEL: ${CLOUD_AGENT_WIZARD_MODEL:-deepseek-v4-flash}
      CLOUD_AGENT_CRITIC_MODEL: ${CLOUD_AGENT_CRITIC_MODEL:-deepseek-v4-pro}
      CLOUD_AGENT_WRITER_MODEL: ${CLOUD_AGENT_WRITER_MODEL:-deepseek-v4-pro}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_ROUTING_MODE: ${EMBEDDING_ROUTING_MODE:-cloud}
      EMBEDDING_INGEST_MODE: ${EMBEDDING_INGEST_MODE:-hybrid}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v4}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
      LOCAL_EMBEDDING_PROVIDER: ${LOCAL_EMBEDDING_PROVIDER:-ollama}
      LOCAL_EMBEDDING_API_KEY: ${LOCAL_EMBEDDING_API_KEY:-ollama}
      LOCAL_EMBEDDING_BASE_URL: ${DOCKER_LOCAL_EMBEDDING_BASE_URL:-http://host.docker.internal:11434/v1}
      LOCAL_EMBEDDING_MODEL: ${LOCAL_EMBEDDING_MODEL:-bge-m3}
      LOCAL_EMBEDDING_DIMENSIONS: ${LOCAL_EMBEDDING_DIMENSIONS:-1024}
      HYBRID_CLOUD_TOP_K: ${HYBRID_CLOUD_TOP_K:-20}
      HYBRID_LOCAL_TOP_K: ${HYBRID_LOCAL_TOP_K:-20}
      HYBRID_RRF_K: ${HYBRID_RRF_K:-60}
      HYBRID_RERANK_TOP_K: ${HYBRID_RERANK_TOP_K:-20}
      RERANK_ENABLED: ${RERANK_ENABLED:-true}
      RERANK_API_KEY: ${RERANK_API_KEY:-}
      RERANK_BASE_URL: ${RERANK_BASE_URL:-https://dashscope.aliyuncs.com/compatible-api/v1}
      RERANK_MODEL: ${RERANK_MODEL:-qwen3-rerank}
      RERANK_TIMEOUT_SECONDS: ${RERANK_TIMEOUT_SECONDS:-30}
      RERANK_MAX_DOCUMENT_CHARS: ${RERANK_MAX_DOCUMENT_CHARS:-12000}
      # 可选外部服务；留空不影响核心链路启动。
      BOCHA_API_KEY: ${BOCHA_API_KEY:-}
      SERPER_API_KEY: ${SERPER_API_KEY:-}
      DOCMIND_ACCESS_KEY_ID: ${DOCMIND_ACCESS_KEY_ID:-}
      DOCMIND_ACCESS_KEY_SECRET: ${DOCMIND_ACCESS_KEY_SECRET:-}
      JUHE_STOCK_API_KEY: ${JUHE_STOCK_API_KEY:-}
      BID_APP_CODE: ${BID_APP_CODE:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-demo-change-before-production}
      ALLOW_INSECURE_DEMO_SECRET: ${ALLOW_INSECURE_DEMO_SECRET:-true}
      RATE_LIMIT_ENABLED: "true"
      CORS_ALLOW_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      AUTO_CREATE_TABLES: "false"
      ENABLE_SCHEDULER: "false"
      READINESS_CHECK_MODELS: "true"
      READINESS_CHECK_TASK_WORKER: "true"
      READINESS_CHECK_OUTBOX_DISPATCHER: "true"
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-1}
      PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus_multiproc
      KNOWLEDGE_UPLOAD_DIR: /data/task_uploads/knowledge
      ATTACHMENT_UPLOAD_DIR: /data/task_uploads/attachments
      TASK_QUEUE_PREFIX: ${TASK_QUEUE_PREFIX:-industry:tasks}
      TASK_QUEUE_RETENTION_SECONDS: ${TASK_QUEUE_RETENTION_SECONDS:-604800}
      TASK_QUEUE_VISIBILITY_TIMEOUT_SECONDS: ${TASK_QUEUE_VISIBILITY_TIMEOUT_SECONDS:-1860}
      TASK_WORKER_HEARTBEAT_TTL_SECONDS: ${TASK_WORKER_HEARTBEAT_TTL_SECONDS:-20}
      OUTBOX_BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-20}
      OUTBOX_POLL_INTERVAL_SECONDS: ${OUTBOX_POLL_INTERVAL_SECONDS:-0.5}
      OUTBOX_LEASE_SECONDS: ${OUTBOX_LEASE_SECONDS:-30}
      OUTBOX_MAX_DELIVERY_ATTEMPTS: ${OUTBOX_MAX_DELIVERY_ATTEMPTS:-8}
      OUTBOX_RETRY_BASE_SECONDS: ${OUTBOX_RETRY_BASE_SECONDS:-1}
      OUTBOX_HEARTBEAT_TTL_SECONDS: ${OUTBOX_HEARTBEAT_TTL_SECONDS:-20}
      OUTBOX_RETENTION_SECONDS: ${OUTBOX_RETENTION_SECONDS:-2592000}
      OUTBOX_CLEANUP_INTERVAL_SECONDS: ${OUTBOX_CLEANUP_INTERVAL_SECONDS:-300}
      RESEARCH_TASK_TIMEOUT_SECONDS: ${RESEARCH_TASK_TIMEOUT_SECONDS:-1800}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./data/semiconductor_sources:/data/semiconductor_sources:ro
      - task_uploads:/data/task_uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
      task-worker:
        condition: service_healthy
      outbox-dispatcher:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=5)"
      interval: 15s
      timeout: 8s
      start_period: 30s
      retries: 5
    networks:
      - industry_network

  task-worker:
    profiles: ["app"]
    image: industry-research-assistant-backend:local
    container_name: industry_task_worker
    command: ["python", "/app/app/scripts/run_task_worker.py"]
    restart: unless-stopped
    environment:
      <<: *app-environment
      ENABLE_SCHEDULER: "false"
      PROMETHEUS_MULTIPROC_DIR: ""
      TASK_WORKER_CONCURRENCY: ${TASK_WORKER_CONCURRENCY:-2}
      TASK_WORKER_METRICS_PORT: 8001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data/semiconductor_sources:/data/semiconductor_sources:ro
      - task_uploads:/data/task_uploads
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "/app/app/scripts/check_task_worker.py"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - industry_network

  outbox-dispatcher:
    profiles: ["app"]
    image: industry-research-assistant-backend:local
    container_name: industry_outbox_dispatcher
    command: ["python", "/app/app/scripts/run_outbox_dispatcher.py"]
    restart: unless-stopped
    environment:
      <<: *app-environment
      ENABLE_SCHEDULER: "false"
      PROMETHEUS_MULTIPROC_DIR: ""
      OUTBOX_METRICS_PORT: 8002
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "/app/app/scripts/check_outbox_dispatcher.py"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 5
    networks:
      - industry_network

  frontend:
    profiles: ["app"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_TITLE: 证据驱动行业研究平台
        VITE_API_BASE: http://localhost:8000/
        VITE_API_PROXY: http://localhost:8000/
    image: industry-research-assistant-frontend:local
    container_name: industry_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - industry_network

  # ==================== PostgreSQL 数据库 ====================
  postgres:
    image: postgres:15-alpine
    container_name: industry_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: industry_assistant
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - industry_network

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: industry_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - industry_network

  # ==================== Milvus 向量数据库 ====================
  etcd:
    image: quay.io/coreos/etcd:v3.5.25
    container_name: industry_etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_v26_data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - industry_network

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: industry_minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - minio_v26_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - industry_network

  milvus:
    image: milvusdb/milvus:v2.6.17
    container_name: industry_milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    security_opt:
      - seccomp:unconfined
    volumes:
      - milvus_v26_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    networks:
      - industry_network

  # ==================== Elasticsearch (可选，用于全文检索) ====================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: industry_elasticsearch
    profiles: ["search"]
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "1200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - industry_network

  # ==================== Prometheus（可选） ====================
  prometheus:
    image: prom/prometheus:v3.13.1
    container_name: industry_prometheus
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - industry_network

  grafana:
    image: grafana/grafana:13.1.0
    container_name: industry_grafana
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-local-demo-change-before-production}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3000:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - industry_network

volumes:
  postgres_data:
  redis_data:
  # v2.6 uses isolated volumes; v2.3 collections must be rebuilt from reviewed Markdown.
  etcd_v26_data:
  minio_v26_data:
  milvus_v26_data:
  es_data:
  prometheus_data:
  grafana_data:
  task_uploads:

networks:
  industry_network:
    driver: bridge
