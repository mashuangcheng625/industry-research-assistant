services:
  # ==================== 应用（可选 app profile） ====================
  backend:
    profiles: ["app"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: industry-research-assistant-backend:local
    container_name: industry_backend
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: industry_assistant
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      MODEL_ROUTING_MODE: local
      LOCAL_LLM_PROVIDER: ollama
      LOCAL_LLM_API_KEY: ollama
      LOCAL_LLM_BASE_URL: ${LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      LOCAL_LLM_MODEL: ${LOCAL_LLM_MODEL:-industry-qwen3:4b}
      EMBEDDING_API_KEY: ollama
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://host.docker.internal:11434/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-local-demo-change-before-production}
      ALLOW_INSECURE_DEMO_SECRET: ${ALLOW_INSECURE_DEMO_SECRET:-true}
      RATE_LIMIT_ENABLED: "true"
      CORS_ALLOW_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      AUTO_CREATE_TABLES: "true"
      ENABLE_SCHEDULER: "false"
      READINESS_CHECK_MODELS: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - ./data/semiconductor_sources:/data/semiconductor_sources:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=5)"
      interval: 15s
      timeout: 8s
      start_period: 30s
      retries: 5
    networks:
      - industry_network

  frontend:
    profiles: ["app"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_TITLE: 证据驱动行业研究平台
        VITE_API_BASE: http://localhost:8000/
        VITE_API_PROXY: http://localhost:8000/
    image: industry-research-assistant-frontend:local
    container_name: industry_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - industry_network

  # ==================== PostgreSQL 数据库 ====================
  postgres:
    image: postgres:15-alpine
    container_name: industry_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: industry_assistant
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - industry_network

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: industry_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - industry_network

  # ==================== Milvus 向量数据库 ====================
  etcd:
    image: quay.io/coreos/etcd:v3.5.25
    container_name: industry_etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_v26_data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - industry_network

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: industry_minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - minio_v26_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - industry_network

  milvus:
    image: milvusdb/milvus:v2.6.17
    container_name: industry_milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    security_opt:
      - seccomp:unconfined
    volumes:
      - milvus_v26_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    networks:
      - industry_network

  # ==================== Elasticsearch (可选，用于全文检索) ====================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: industry_elasticsearch
    profiles: ["search"]
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "1200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - industry_network

  # ==================== Prometheus（可选） ====================
  prometheus:
    image: prom/prometheus:v3.13.1
    container_name: industry_prometheus
    restart: unless-stopped
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - industry_network

volumes:
  postgres_data:
  redis_data:
  # v2.6 uses isolated volumes; v2.3 collections must be rebuilt from reviewed Markdown.
  etcd_v26_data:
  minio_v26_data:
  milvus_v26_data:
  es_data:
  prometheus_data:

networks:
  industry_network:
    driver: bridge
