groups:
  - name: industry-research-agent
    rules:
      - alert: ResearchAgentTimeoutDetected
        expr: increase(industry_research_agent_timeouts_total[15m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Research Agent timed out in the last 15 minutes

      - alert: ResearchRunErrorDetected
        expr: increase(industry_research_runs_total{outcome="error"}[15m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: A research run ended with an infrastructure or execution error

      - alert: ResearchCheckpointFailureDetected
        expr: increase(industry_research_checkpoint_operations_total{outcome="failure"}[15m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: A research checkpoint could not be persisted

      - alert: ResearchRunLockUnavailable
        expr: increase(industry_research_run_lock_operations_total{outcome="unavailable"}[15m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Redis could not guarantee exclusive research execution

      - alert: PersistentTaskWorkerDown
        expr: up{job="industry-task-worker"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: The persistent background-task worker is unavailable

      - alert: PersistentTaskBacklogHigh
        expr: industry_background_task_queue_depth > 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Persistent background-task backlog has remained above 20

      - alert: PersistentTaskFailuresDetected
        expr: increase(industry_background_tasks_total{outcome="error"}[15m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: A persistent background-task attempt failed or timed out

      - alert: TransactionalOutboxDispatcherDown
        expr: up{job="industry-outbox-dispatcher"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: PostgreSQL task intents are not being published to Redis

      - alert: TransactionalOutboxBacklogHigh
        expr: industry_task_outbox_pending_events > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: Transactional outbox backlog has remained above 50

      - alert: TransactionalOutboxDeliveryFailed
        expr: increase(industry_task_outbox_deliveries_total{outcome="failed"}[15m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: An outbox row exhausted its Redis delivery attempts

      - alert: LexicalSearchFallbackDetected
        expr: increase(industry_lexical_searches_total{outcome="fallback"}[15m]) > 0
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: Hybrid retrieval fell back from Milvus BM25 to an in-process scan
