# P2-21: reference nginx reverse proxy with TLS termination
#
# Place this file at docker/nginx/nginx.conf and adjust the upstream
# addresses, certificate paths and server_name before deploying.
#
# The configuration assumes:
# - FastAPI backend at 127.0.0.1:8000 (not exposed directly)
# - Nginx frontend (or standalone Vite dev) at 127.0.0.1:5183
# - SSL certificates at /etc/letsencrypt/live/your-domain/
#

upstream backend {
    server 127.0.0.1:8000;
    keepalive 8;
}

upstream frontend {
    server 127.0.0.1:5183;
    keepalive 4;
}

server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.example.com;

    ssl_certificate     /etc/letsencrypt/live/your-domain/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── API ──
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20m;
        proxy_read_timeout 60s;
    }

    # SSE (Research Agent streaming)
    location /api/research/stream {
        proxy_pass http://backend;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # ── Frontend ──
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
