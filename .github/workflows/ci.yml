name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: industry_assistant_migration_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d industry_assistant_migration_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements-lock.txt
      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-lock.txt
      - name: Check dependency consistency
        run: make check-backend-deps PYTHON=python
      - name: Prepare isolated backup database
        env:
          MIGRATION_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/industry_assistant_migration_test
        run: |
          pg_dump --version
          pg_restore --version
          python - <<'PY'
          import os
          from sqlalchemy import create_engine

          engine = create_engine(
              os.environ["MIGRATION_TEST_DATABASE_URL"],
              isolation_level="AUTOCOMMIT",
          )
          with engine.connect() as connection:
              connection.exec_driver_sql("CREATE DATABASE industry_assistant_backup_test")
              connection.exec_driver_sql("CREATE DATABASE industry_assistant_outbox_test")
          engine.dispose()
          PY
      - name: Compile backend
        run: python -m compileall -q backend/app backend/test
      - name: Run backend unit tests
        working-directory: backend
        env:
          PYTHONPATH: app
        run: timeout 240s python -m pytest -q -m "not integration" -W error::DeprecationWarning
      - name: Run backend integration tests
        working-directory: backend
        env:
          PYTHONPATH: app
          REDIS_RATE_LIMIT_TEST_URL: redis://127.0.0.1:6379/15
          REDIS_TASK_QUEUE_TEST_URL: redis://127.0.0.1:6379/15
          MIGRATION_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/industry_assistant_migration_test
          BACKUP_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/industry_assistant_backup_test
          OUTBOX_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/industry_assistant_outbox_test
        run: timeout 120s python -m pytest -q -m integration -W error::DeprecationWarning
      - name: Import backend without external services
        run: make check-backend-import PYTHON=python
      - name: Validate source governance and evaluation data
        run: |
          make validate-sources PYTHON=python
          make validate-eval PYTHON=python
          make validate-baseline PYTHON=python
          make evaluate-multi-source PYTHON=python
      - name: Validate Docker Compose
        run: make validate-compose

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate application profile
        run: docker compose --profile app config --quiet
      - name: Build clean backend and frontend images
        run: docker compose --profile app build backend frontend
